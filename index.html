<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <title>Login</title>
</head>
<body>
    <main>
        <header>
            <h1>Minha Loja de Games</h1>
        </header>
        <section id="login">
            <div id="img">
                
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Faça login para se cadastrar e começar a comprar!</p>
                <form action="cadastro.php" method="post">

                    <div class="campo">
                        <label for="imail">e-mail</label>
                        <input type="email" name="email" id="imail" placeholder="seu email" required maxlength="30" autocomplete="email">
                    </div>

                    <div class="campo">
                        <label for="isenha">senha</label>
                        <input type="password" name="senha" id="isenha" placeholder="sua senha" required minlength="8" maxlength="20" autocomplete="current-password">
                    </div>

                    <input type="submit" value="Entrar">
                    <a href="esqueci.html">Esqueci minha senha</a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
