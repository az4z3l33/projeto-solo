<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <title>Login</title>
</head>
<body>
    <main>
        <header>
            <h1>Minha Loja de Games</h1>
        </header>
        <section id="login">
            <div id="img">
                
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Faça login para se cadastrar e começar a comprar!</p>
                <form action="cadastro.php" method="post">

                    <div class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <label for="imail"></label>
                        <input type="email" name="email" id="imail" placeholder="seu email" required maxlength="30" autocomplete="email">
                    </div>

                    <div class="campo">
                        <span class="material-symbols-outlined">lock</span>
                        <label for="isenha"></label>
                        <input type="password" name="senha" id="isenha" placeholder="sua senha" required minlength="8" maxlength="20" autocomplete="current-password">
                    </div>

                        <input type="submit" value="Entrar">
                        <a href="esqueci.html" class="botao">Esqueci minha senha</a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
